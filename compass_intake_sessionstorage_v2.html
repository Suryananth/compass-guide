<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass Guide — Build Your Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: rgba(201,168,76,0.15);
    --teal: #4ECDC4;
    --teal-dim: rgba(78,205,196,0.12);
    --bg: #0A0C10;
    --bg2: #0E1118;
    --bg3: #141820;
    --surface: #181E28;
    --border: rgba(201,168,76,0.2);
    --text: #F0EDE6;
    --text-dim: rgba(240,237,230,0.5);
    --text-muted: rgba(240,237,230,0.3);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(78,205,196,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Compass rose watermark */
  .watermark {
    position: fixed;
    bottom: -120px;
    right: -120px;
    width: 500px;
    height: 500px;
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    background: rgba(10,12,16,0.8);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
  }

  .logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .logo-sub {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 1px;
  }

  /* Progress bar */
  .progress-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(201,168,76,0.1);
    z-index: 200;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--teal));
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 10%;
  }

  /* Step counter */
  .step-counter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
  }

  .step-counter span {
    color: var(--gold);
  }

  /* Main stage */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 80px 20px 80px;
  }

  /* Question card */
  .question-card {
    width: 100%;
    max-width: 680px;
    animation: slideUp 0.45s cubic-bezier(0.4,0,0.2,1) forwards;
  }

  .question-card.exit {
    animation: slideDown 0.3s cubic-bezier(0.4,0,0.2,1) forwards;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(32px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideDown {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(-24px); }
  }

  .question-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .question-num::after {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--gold);
    opacity: 0.4;
  }

  .question-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 400;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 8px;
  }

  .question-hint {
    font-size: 14px;
    font-weight: 300;
    color: var(--text-dim);
    margin-bottom: 40px;
    letter-spacing: 0.02em;
  }

  /* Input styles */
  .input-text {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--border);
    padding: 12px 0;
    font-family: 'Outfit', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    outline: none;
    transition: border-color 0.3s;
    caret-color: var(--gold);
  }

  .input-text::placeholder { color: var(--text-muted); }
  .input-text:focus { border-color: var(--gold); }

  /* Option grid */
  .options-grid {
    display: grid;
    gap: 10px;
  }

  .options-grid.cols-2 {
    grid-template-columns: 1fr 1fr;
  }

  .options-grid.cols-3 {
    grid-template-columns: repeat(3, 1fr);
  }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold-dim), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .option-btn:hover { border-color: rgba(201,168,76,0.45); transform: translateY(-1px); }
  .option-btn:hover::before { opacity: 1; }

  .option-btn.selected {
    border-color: var(--gold);
    background: var(--gold-dim);
  }

  .option-btn.selected::before { opacity: 1; }

  .option-letter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    background: rgba(201,168,76,0.12);
    width: 22px;
    height: 22px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    letter-spacing: 0;
  }

  .option-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  .option-label { flex: 1; line-height: 1.3; }
  .option-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Track cards — larger with icons */
  .tracks-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .track-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .track-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold-dim), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .track-card:hover { border-color: rgba(201,168,76,0.45); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .track-card:hover::before { opacity: 1; }
  .track-card.selected { border-color: var(--gold); background: var(--gold-dim); }
  .track-card.selected::before { opacity: 1; }

  .track-emoji { font-size: 22px; margin-bottom: 8px; display: block; }
  .track-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .track-example { font-size: 11px; color: var(--text-muted); font-weight: 300; }

  /* Slider */
  .slider-wrap { padding: 10px 0 20px; }

  .time-options {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* Textarea */
  .input-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 120px;
    transition: border-color 0.3s;
    caret-color: var(--gold);
    line-height: 1.6;
  }

  .input-textarea::placeholder { color: var(--text-muted); }
  .input-textarea:focus { border-color: var(--gold); }

  /* CTA area */
  .cta-row {
    margin-top: 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .btn-next {
    background: var(--gold);
    color: #0A0C10;
    border: none;
    border-radius: 8px;
    padding: 14px 32px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-next:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(201,168,76,0.3); }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-back {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: color 0.2s;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-back:hover { color: var(--text-dim); }

  .key-hint {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .key-hint kbd {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  /* Optional question banner */
  .optional-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--teal-dim);
    border: 1px solid rgba(78,205,196,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--teal);
    margin-bottom: 14px;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  /* Final screen */
  .final-screen {
    text-align: center;
    animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
  }

  .final-icon {
    font-size: 56px;
    margin-bottom: 24px;
    display: block;
  }

  .final-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 400;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--gold), var(--teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .final-sub {
    font-size: 16px;
    font-weight: 300;
    color: var(--text-dim);
    margin-bottom: 40px;
    line-height: 1.6;
  }

  .email-wrap {
    display: flex;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
  }

  .input-email {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--text);
    outline: none;
    transition: border-color 0.3s;
    caret-color: var(--gold);
  }

  .input-email::placeholder { color: var(--text-muted); }
  .input-email:focus { border-color: var(--gold); }

  .btn-generate {
    background: linear-gradient(135deg, var(--gold), #B8963C);
    color: #0A0C10;
    border: none;
    border-radius: 8px;
    padding: 14px 28px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(201,168,76,0.4); }

  .privacy-note {
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    border-top: 1px solid rgba(201,168,76,0.06);
    background: rgba(10,12,16,0.6);
    backdrop-filter: blur(12px);
  }

  .nav-tagline {
    font-size: 12px;
    font-weight: 300;
    color: var(--text-muted);
    font-style: italic;
  }

  .nav-steps {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .nav-dot.active { background: var(--gold); transform: scale(1.3); }
  .nav-dot.done { background: rgba(201,168,76,0.4); }

  /* Responsive */
  @media (max-width: 600px) {
    .header { padding: 16px 20px; }
    .tracks-grid { grid-template-columns: 1fr; }
    .options-grid.cols-2 { grid-template-columns: 1fr; }
    .options-grid.cols-3 { grid-template-columns: 1fr 1fr; }
    .email-wrap { flex-direction: column; }
    .question-text { font-size: 26px; }
    .bottom-nav { padding: 14px 20px; }
    .key-hint { display: none; }
  }

  /* Add question section */
  .add-question-wrap {
    margin-top: 20px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }

  .add-question-toggle {
    background: transparent;
    border: 1px dashed rgba(201,168,76,0.3);
    border-radius: 8px;
    padding: 12px 18px;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .add-question-toggle:hover { border-color: var(--gold); color: var(--text-dim); }

  .add-question-form {
    display: none;
    margin-top: 14px;
    gap: 10px;
    flex-direction: column;
  }

  .add-question-form.visible { display: flex; }

  .input-add-q {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--text);
    outline: none;
    transition: border-color 0.3s;
    caret-color: var(--gold);
  }

  .input-add-q::placeholder { color: var(--text-muted); }
  .input-add-q:focus { border-color: var(--gold); }

  .btn-add-confirm {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 6px;
    padding: 10px 20px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    align-self: flex-start;
  }

  .btn-add-confirm:hover { background: var(--gold-dim); }
</style>
</head>
<body>

<!-- Progress bar -->
<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<!-- Header -->
<header class="header">
  <a href="#" class="logo">
    <svg class="logo-icon" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="#C9A84C" stroke-width="1"/>
      <path d="M14 2 L16 12 L14 14 L12 12 Z" fill="#C9A84C"/>
      <path d="M14 26 L12 16 L14 14 L16 16 Z" fill="rgba(201,168,76,0.35)"/>
      <path d="M2 14 L12 12 L14 14 L12 16 Z" fill="rgba(201,168,76,0.35)"/>
      <path d="M26 14 L16 16 L14 14 L16 12 Z" fill="#C9A84C"/>
      <circle cx="14" cy="14" r="2" fill="#C9A84C"/>
    </svg>
    <div>
      <div class="logo-text">Compass Guide</div>
      <div class="logo-sub">College Readiness</div>
    </div>
  </a>
  <div class="step-counter">Question <span id="stepNum">1</span> of <span id="totalNum">10</span></div>
</header>

<!-- Main stage -->
<div class="stage">
  <div id="questionContainer"></div>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <div class="nav-tagline">For families navigating a system nobody explained to them.</div>
  <div class="nav-steps" id="navDots"></div>
</div>

<!-- Compass watermark -->
<svg class="watermark" viewBox="0 0 200 200" fill="none">
  <circle cx="100" cy="100" r="95" stroke="white" stroke-width="1"/>
  <path d="M100 10 L110 90 L100 100 L90 90 Z" fill="white"/>
  <path d="M100 190 L90 110 L100 100 L110 110 Z" fill="white"/>
  <path d="M10 100 L90 90 L100 100 L90 110 Z" fill="white"/>
  <path d="M190 100 L110 110 L100 100 L110 90 Z" fill="white"/>
  <circle cx="100" cy="100" r="8" fill="white"/>
  <circle cx="100" cy="100" r="60" stroke="white" stroke-width="0.5" stroke-dasharray="4 6"/>
</svg>

<script>
const TRACKS = [
  { emoji: '🔬', name: 'STEM Research', example: 'ISEF, NASA SEES, NIH SIP' },
  { emoji: '🩺', name: 'Pre-Med', example: 'HOSA, hospital shadowing' },
  { emoji: '💼', name: 'Business & Entrepreneurship', example: 'DECA, FBLA, Wharton programs' },
  { emoji: '🎨', name: 'Arts & Design', example: 'Scholastic Arts, YoungArts' },
  { emoji: '✍️', name: 'Humanities & Writing', example: 'Nat\'l History Day, journalism' },
  { emoji: '🏅', name: 'Athletics', example: 'NCAA eligibility, recruiting' },
  { emoji: '🌍', name: 'Community Leadership', example: 'Congressional Award, nonprofits' },
  { emoji: '🧭', name: 'Help Me Explore', example: 'Interest discovery, undecided' }
];

const GRADES = ['7th Grade','8th Grade','9th Grade','10th Grade','11th Grade','12th Grade'];
const SCHOOL_TYPES = [
  { icon: '🏫', label: 'Public School', sub: 'District or magnet' },
  { icon: '🎓', label: 'Private School', sub: 'Independent or parochial' },
  { icon: '🏠', label: 'Homeschool', sub: 'Full or hybrid' },
  { icon: '🌐', label: 'Charter / Online', sub: '' }
];
const WHO_FILLING = [
  { icon: '👤', label: 'The student', sub: 'I\'m building my own roadmap' },
  { icon: '👨‍👩‍👦', label: 'A parent', sub: 'Planning ahead for my child' },
  { icon: '👥', label: 'Both of us', sub: 'We\'re doing this together' }
];
const GPA_LEVELS = [
  { label: '4.0 / All A\'s', sub: 'Top of class' },
  { label: '3.5 – 3.9', sub: 'Mostly A\'s' },
  { label: '3.0 – 3.4', sub: 'A\'s and B\'s' },
  { label: 'Below 3.0', sub: 'Working on it' },
  { label: 'Not sure yet', sub: 'Grade 7 or 8' }
];
const TIME_OPTIONS = [
  { label: '< 2 hrs/week', sub: 'Light commitment' },
  { label: '2–5 hrs/week', sub: 'Moderate' },
  { label: '5–10 hrs/week', sub: 'Serious' },
  { label: '10+ hrs/week', sub: 'All in' }
];

let current = 0;
let answers = {};
let customQuestion = null;
let customAnswer = '';
let addQuestionVisible = false;

const TOTAL_BASE = 9;

function totalQuestions() {
  return customQuestion ? TOTAL_BASE + 1 : TOTAL_BASE;
}

const questions = [
  {
    id: 'who',
    num: 1,
    label: 'WHO IS THIS FOR',
    text: 'Who is filling this out today?',
    hint: 'This helps us tune the language and guidance.',
    type: 'options',
    options: WHO_FILLING,
    cols: 'cols-3'
  },
  {
    id: 'name',
    num: 2,
    label: 'STUDENT NAME',
    text: 'What\'s the student\'s first name?',
    hint: 'We\'ll use this to personalize your roadmap.',
    type: 'text',
    placeholder: 'First name...'
  },
  {
    id: 'grade',
    num: 3,
    label: 'CURRENT GRADE',
    text: 'What grade is the student in?',
    hint: 'Your roadmap arc starts from here — even grade 7.',
    type: 'options',
    options: GRADES.map(g => ({ label: g })),
    cols: 'cols-3'
  },
  {
    id: 'school',
    num: 4,
    label: 'SCHOOL TYPE',
    text: 'What kind of school does the student attend?',
    hint: 'Helps us tailor competition and program recommendations.',
    type: 'options',
    options: SCHOOL_TYPES,
    cols: 'cols-2'
  },
  {
    id: 'track',
    num: 5,
    label: 'STUDENT TRACK',
    text: 'Which path feels closest to the student\'s direction?',
    hint: 'You can always change this. Pick what feels true right now.',
    type: 'tracks'
  },
  {
    id: 'gpa',
    num: 6,
    label: 'ACADEMIC LEVEL',
    text: 'How would you describe the student\'s current grades?',
    hint: 'No judgment — this helps calibrate competition difficulty.',
    type: 'options',
    options: GPA_LEVELS,
    cols: 'cols-2'
  },
  {
    id: 'time',
    num: 7,
    label: 'TIME AVAILABLE',
    text: 'How much time can the student realistically commit each week?',
    hint: 'Outside of school and homework.',
    type: 'options',
    options: TIME_OPTIONS,
    cols: 'cols-2'
  },
  {
    id: 'activities',
    num: 8,
    label: 'CURRENT ACTIVITIES',
    text: 'What is the student already doing outside of school?',
    hint: 'Sports, clubs, music, volunteering — anything counts. Or "nothing yet."',
    type: 'textarea',
    placeholder: 'e.g. Violin since age 8, junior varsity tennis, school newspaper...'
  },
  {
    id: 'goals',
    num: 9,
    label: 'GOALS & DREAMS',
    text: 'Any dream colleges, careers, or goals in mind?',
    hint: 'Even vague is fine. "Something in medicine" or "MIT" both work.',
    type: 'textarea',
    placeholder: 'e.g. MIT, pre-med, or just want to stand out for top schools...',
    optional: true
  }
];

function renderDots() {
  const container = document.getElementById('navDots');
  const total = totalQuestions();
  container.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'nav-dot' + (i === current ? ' active' : i < current ? ' done' : '');
    container.appendChild(dot);
  }
}

function updateProgress() {
  const total = totalQuestions();
  const pct = ((current + 1) / (total + 1)) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepNum').textContent = current + 1;
  document.getElementById('totalNum').textContent = total;
  renderDots();
}

function getQuestionList() {
  const list = [...questions];
  if (customQuestion) {
    list.push({
      id: 'custom',
      num: TOTAL_BASE + 1,
      label: 'YOUR QUESTION',
      text: customQuestion,
      type: 'textarea',
      placeholder: 'Your answer...',
      optional: true
    });
  }
  return list;
}

function renderQuestion(idx, direction = 'up') {
  const container = document.getElementById('questionContainer');
  const qList = getQuestionList();
  const q = qList[idx];
  if (!q) { renderFinal(); return; }

  updateProgress();

  const card = document.createElement('div');
  card.className = 'question-card';

  let html = `<div class="question-num">${String(q.num || idx+1).padStart(2,'0')}&nbsp;&nbsp;${q.label || ''}</div>`;
  if (q.optional) html += `<div class="optional-badge">✦ Optional</div>`;
  html += `<div class="question-text">${q.text}</div>`;
  html += `<div class="question-hint">${q.hint || ''}</div>`;

  if (q.type === 'text') {
    html += `<input class="input-text" type="text" placeholder="${q.placeholder || ''}" id="mainInput" value="${answers[q.id] || ''}" autocomplete="off" />`;
  } else if (q.type === 'textarea') {
    html += `<textarea class="input-textarea" placeholder="${q.placeholder || ''}" id="mainInput">${answers[q.id] || ''}</textarea>`;
  } else if (q.type === 'tracks') {
    html += `<div class="tracks-grid">`;
    TRACKS.forEach((t, i) => {
      const sel = answers[q.id] === t.name ? ' selected' : '';
      html += `<button class="track-card${sel}" data-value="${t.name}" onclick="selectOption(this,'${q.id}')">
        <span class="track-emoji">${t.emoji}</span>
        <div class="track-name">${t.name}</div>
        <div class="track-example">${t.example}</div>
      </button>`;
    });
    html += `</div>`;
  } else if (q.type === 'options') {
    html += `<div class="options-grid ${q.cols || ''}">`;
    q.options.forEach((opt, i) => {
      const letters = 'ABCDEFGHIJKLMNOP';
      const sel = answers[q.id] === (opt.label || opt) ? ' selected' : '';
      const icon = opt.icon ? `<span class="option-icon">${opt.icon}</span>` : `<span class="option-letter">${letters[i]}</span>`;
      html += `<button class="option-btn${sel}" data-value="${opt.label || opt}" onclick="selectOption(this,'${q.id}')">
        ${icon}
        <div class="option-label">
          ${opt.label || opt}
          ${opt.sub ? `<div class="option-sub">${opt.sub}</div>` : ''}
        </div>
      </button>`;
    });
    html += `</div>`;
  }

  // Add-a-question section on last real question
  if (idx === TOTAL_BASE - 1 && !customQuestion) {
    html += `<div class="add-question-wrap">
      <button class="add-question-toggle" onclick="toggleAddQuestion()">
        <span>＋</span> Add your own question to the roadmap
      </button>
      <div class="add-question-form" id="addQForm">
        <input class="input-add-q" id="addQInput" placeholder="e.g. What study abroad programs should we consider?" />
        <button class="btn-add-confirm" onclick="confirmAddQuestion()">Add this question →</button>
      </div>
    </div>`;
  }

  html += `<div class="cta-row">`;
  if (idx > 0) html += `<button class="btn-back" onclick="goBack()">← Back</button>`;
  html += `<button class="btn-next" id="btnNext" onclick="goNext()">
    Continue <span>→</span>
  </button>`;
  if (q.type === 'text' || q.type === 'textarea') {
    html += `<div class="key-hint"><kbd>Enter</kbd> to continue</div>`;
  }
  html += `</div>`;

  card.innerHTML = html;

  container.innerHTML = '';
  container.appendChild(card);

  // Focus text input
  const inp = document.getElementById('mainInput');
  if (inp) {
    setTimeout(() => inp.focus(), 100);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey && q.type !== 'textarea') { e.preventDefault(); goNext(); }
    });
  }
}

function selectOption(el, qid) {
  const parent = el.parentElement;
  parent.querySelectorAll('.selected').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  answers[qid] = el.dataset.value;
  setTimeout(() => goNext(), 280);
}

function goNext() {
  const qList = getQuestionList();
  const q = qList[current];
  if (q && (q.type === 'text' || q.type === 'textarea')) {
    const inp = document.getElementById('mainInput');
    if (inp) answers[q.id] = inp.value.trim();
  }
  if (current < qList.length - 1) {
    animateOut(() => { current++; renderQuestion(current); });
  } else {
    animateOut(() => renderFinal());
  }
}

function goBack() {
  if (current > 0) {
    animateOut(() => { current--; renderQuestion(current, 'down'); });
  }
}

function animateOut(cb) {
  const card = document.querySelector('.question-card');
  if (card) {
    card.classList.add('exit');
    setTimeout(cb, 280);
  } else cb();
}

function toggleAddQuestion() {
  const form = document.getElementById('addQForm');
  if (form) {
    addQuestionVisible = !addQuestionVisible;
    form.classList.toggle('visible', addQuestionVisible);
    if (addQuestionVisible) document.getElementById('addQInput')?.focus();
  }
}

function confirmAddQuestion() {
  const inp = document.getElementById('addQInput');
  if (inp && inp.value.trim()) {
    customQuestion = inp.value.trim();
    document.getElementById('totalNum').textContent = totalQuestions();
    renderQuestion(current);
  }
}

function renderFinal() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('stepNum').textContent = '✓';

  const container = document.getElementById('questionContainer');
  const name = answers['name'] ? answers['name'] : 'your student';

  container.innerHTML = `
    <div class="final-screen">
      <span class="final-icon">🧭</span>
      <div class="final-title">Your roadmap is ready.</div>
      <div class="final-sub">
        We have everything we need to build a personalized 6-year plan for ${name}.<br>
        Enter your email to generate the roadmap — takes about 30 seconds.
      </div>
      <div class="email-wrap">
        <input class="input-email" type="email" placeholder="your@email.com" id="emailInput" />
        <button class="btn-generate" onclick="generateRoadmap()">Generate →</button>
      </div>
      <div class="privacy-note">No spam. No credit card. Free preview included.</div>
    </div>
  `;

  // Hide bottom nav dots on final screen
  document.getElementById('navDots').innerHTML = '';
}

function generateRoadmap() {
  const email = document.getElementById('emailInput')?.value?.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('emailInput').style.borderColor = '#ff6b6b';
    return;
  }
  answers['email'] = email;
  console.log('Compass Guide — Answers:', JSON.stringify(answers, null, 2));

  // ── Phase 1b: Save to sessionStorage and redirect to roadmap ──
  sessionStorage.setItem('compassAnswers', JSON.stringify(answers));

  document.querySelector('.final-screen').innerHTML = `
    <span class="final-icon">⚡</span>
    <div class="final-title" style="font-size:36px;">Generating your roadmap...</div>
    <div class="final-sub">Building ${answers['name'] || 'your student'}'s 6-year plan for ${answers['track'] || 'your chosen track'}.</div>
    <div style="width:240px;height:3px;background:rgba(201,168,76,0.15);border-radius:2px;margin:24px auto 0;overflow:hidden;">
      <div style="height:100%;background:linear-gradient(90deg,var(--gold),var(--teal));animation:load 2s ease-in-out forwards;border-radius:2px;"></div>
    </div>
    <style>@keyframes load{from{width:0}to{width:100%}}</style>
  `;

  // Redirect to roadmap after brief loading animation
  setTimeout(() => {
    window.location.href = 'compass_roadmap_sessionstorage_v2.html';
  }, 2200);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || (e.key === 'Enter' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA')) {
    const q = getQuestionList()[current];
    if (q && q.type !== 'text' && q.type !== 'textarea') goNext();
  }
});

// Init
renderQuestion(0);
</script>
</body>
</html>
